# ============================================================
#  release.yml  —  AIACTA Automated Release Workflow
# ============================================================
#
#  WHAT THIS DOES:
#  When a maintainer pushes a version tag (e.g. "v1.1.0"),
#  this workflow automatically:
#    1. Runs the full test suite one final time
#    2. Publishes packages to npm (public registry)
#    3. Publishes the Python SDK to PyPI
#    4. Creates a GitHub Release with the CHANGELOG section
#    5. Builds and uploads the dashboard dist as a release asset
#
#  HOW TO TRIGGER A RELEASE:
#    git tag -a v1.1.0 -m "Release v1.1.0"
#    git push origin v1.1.0
#
#  REQUIRED GITHUB SECRETS (set in Settings → Secrets → Actions):
#    NPM_TOKEN      — npm publish token from npmjs.com
#    PYPI_TOKEN     — PyPI API token from pypi.org
#    CODECOV_TOKEN  — from codecov.io (optional)
#
#  IMPORTANT: Only maintainers should push tags. The npm and
#  PyPI tokens give write access to public packages. Protect them.
# ============================================================

name: Release

on:
  # Fires when release-please (or anyone) publishes a GitHub Release.
  # This works even when the release was created by GITHUB_TOKEN —
  # unlike push:tags which is suppressed by GitHub's anti-loop rule.
  release:
    types: [published]

  # Allows manually triggering from the Actions tab.
  # Use this to re-publish if a release failed, or to publish v1.0.0 now.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.0) — must match package.json'
        required: true
        default: '1.0.0'


# Release jobs need write permission to create GitHub Releases.
permissions:
  contents: write    # Create releases and upload assets
  id-token: write    # For PyPI trusted publishing (OIDC)

jobs:

  # ──────────────────────────────────────────────────────────────
  # JOB 1 — VALIDATE TAG FORMAT
  # Catches typos like "v1.1" or "1.1.0" (missing "v" prefix)
  # before we waste time running all the release steps.
  # ──────────────────────────────────────────────────────────────
  validate-tag:
      name: Validate release version
      runs-on: ubuntu-latest
      outputs:
        version: ${{ steps.parse.outputs.version }}
        is_prerelease: ${{ steps.parse.outputs.is_prerelease }}
      steps:
        - name: Parse version from release or manual input
          id: parse
          run: |
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              TAG="v${{ github.event.inputs.version }}"
            else
              # release event: github.ref_name is the tag (e.g. v1.0.0)
              TAG="${{ github.ref_name }}"
            fi
            echo "Tag: $TAG"

            if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+(-.+)?$'; then
              echo "Invalid tag format: $TAG"
              exit 1
            fi

            VERSION="${TAG#v}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"

            if echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+-'; then
              echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            else
              echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            fi
  
  # ──────────────────────────────────────────────────────────────
  # JOB 2 — PRE-RELEASE TEST RUN
  # Runs the full test suite one final time on the exact commit
  # being tagged. If tests fail at release time, the release is
  # aborted before anything is published.
  # ──────────────────────────────────────────────────────────────
  test:
    name: Final test run before release
    runs-on: ubuntu-latest
    needs: [validate-tag]
    steps:
      - uses: actions/checkout@v6

      - name: Sync all package versions from root package.json
        run: |
          ROOT_VERSION=$(node -p "require('./package.json').version")
          echo "Root version: $ROOT_VERSION"
          for pkg in \
            packages/ai-attribution-lint \
            packages/ai-citation-sdk \
            packages/crawl-manifest-client \
            packages/aac-server \
            packages/aac-dashboard-lite \
            packages/vwp-gateway \
            packages/referrer-middleware \
            packages/honeypot-verifier \
            packages/attribution-test-harness; do
            node -e "
              const fs = require('fs');
              const path = './$pkg/package.json';
              const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
              pkg.version = '$ROOT_VERSION';
              fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
              console.log('  ✓ ' + path + ' → ' + '$ROOT_VERSION');
            "
          done


      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache-dependency-path: packages/ai-citation-sdk/src/go/go.mod
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install npm dependencies
        run: npm install

      - name: Run all Node.js tests
        run: npm test --workspaces --if-present
        env:
          NODE_ENV: test
          AAC_DB_PATH: ':memory:'
          CI: 'true'

      - name: Run Go tests
        run: go test -v -race ./...
        working-directory: packages/ai-citation-sdk/src/go

      - name: Install Python deps and run tests
        run: |
          pip install -r packages/crawl-manifest-client/src/python/requirements.txt
          python -m pytest packages/crawl-manifest-client/tests/python_client.test.py \
            --import-mode=importlib \
            -v --tb=short

  # ──────────────────────────────────────────────────────────────
  # JOB 3 — PUBLISH TO NPM
  # Publishes the four user-facing Node.js packages to the
  # public npm registry under the @aiacta-org scope (or unscoped).
  #
  # PACKAGES PUBLISHED:
  #   ai-attribution-lint     (CLI tool — npx ai-attribution-lint)
  #   ai-citation-sdk         (webhook receiver SDK)
  #   crawl-manifest-client   (API client)
  #
  # NOT PUBLISHED (server/deployment packages):
  #   aac-server, vwp-gateway, honeypot-verifier, referrer-middleware,
  #   attribution-test-harness, aac-dashboard-lite
  #   (These are deployed, not downloaded as libraries)
  # ──────────────────────────────────────────────────────────────
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [validate-tag, test]
    environment:
      # "production" environment in GitHub requires manual approval before proceeding.
      name: production
      url: https://www.npmjs.com/package/ai-attribution-lint

    steps:
      - uses: actions/checkout@v6

      - name: Sync all package versions from root package.json
        run: |
          ROOT_VERSION=$(node -p "require('./package.json').version")
          echo "Publishing version: $ROOT_VERSION"
          for pkg in \
            packages/ai-attribution-lint \
            packages/ai-citation-sdk \
            packages/crawl-manifest-client \
            packages/aac-server \
            packages/aac-dashboard-lite \
            packages/vwp-gateway \
            packages/referrer-middleware \
            packages/honeypot-verifier \
            packages/attribution-test-harness; do
            node -e "
              const fs = require('fs');
              const path = './$pkg/package.json';
              const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
              pkg.version = '$ROOT_VERSION';
              fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
              console.log('  ✓ ' + path + ' → ' + '$ROOT_VERSION');
            "
          done

      - name: Set up Node.js with npm registry auth
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      # Verify the package.json version matches the git tag.
      # Prevents publishing version 1.0.0 when the tag is v1.1.0.
      - name: Verify all package versions match release tag
        run: |
          TAG_VERSION="${{ needs.validate-tag.outputs.version }}"
          FAILED=0
          for pkg in \
            packages/ai-attribution-lint \
            packages/ai-citation-sdk \
            packages/crawl-manifest-client; do
            PKG_VERSION=$(node -p "require('./$pkg/package.json').version")
            if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
              echo "❌  $pkg: expected $TAG_VERSION, found $PKG_VERSION"
              FAILED=1
            else
              echo "✅  $pkg: $PKG_VERSION"
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "Version mismatch. release-please should have updated all package.json files."
            echo "Check that extra-files is configured in .release-please-config.json"
            exit 1
          fi          

      - name: Publish @aiacta-org/ai-attribution-lint
        run: npm publish --access public
        working-directory: packages/ai-attribution-lint
        env:
          # NODE_AUTH_TOKEN is the npm access token stored in GitHub Secrets.
          # actions/setup-node reads this and writes ~/.npmrc automatically.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @aiacta-org/ai-citation-sdk (Node.js)
        run: npm publish --access public
        working-directory: packages/ai-citation-sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @aiacta-org/crawl-manifest-client
        run: npm publish --access public
        working-directory: packages/crawl-manifest-client
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # JOB 4 — PUBLISH PYTHON SDK TO PyPI
  # Uses PyPI's "trusted publishing" (OIDC) which is more secure
  # than API tokens because no long-lived secret is stored in GitHub.
  #
  # SETUP STEPS (one-time, do before first release):
  #   1. Go to pypi.org → Your Account → Publishing
  #   2. Add a "trusted publisher" with:
  #      Owner: aiacta-org
  #      Repository: aiacta
  #      Workflow: release.yml
  #      Environment: production
  # ──────────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish Python SDK to PyPI
    runs-on: ubuntu-latest
    needs: [validate-tag, test]
    environment:
      name: production
      url: https://pypi.org/project/ai-citation-sdk/

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build twine

      - name: Build Python package
        run: python -m build
        working-directory: packages/ai-citation-sdk/src/python

      # Verify the distribution before uploading.
      # twine check catches common packaging errors.
      - name: Verify distribution packages
        run: twine check packages/ai-citation-sdk/src/python/dist/*

      # Publish using OIDC (no stored API token required).
      # Requires the trusted publisher to be configured on PyPI (see above).
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/ai-citation-sdk/src/python/dist/
          # verbose: true shows upload progress
          verbose: true

  # ──────────────────────────────────────────────────────────────
  # JOB 5 — BUILD DASHBOARD FOR RELEASE
  # Builds the dashboard and uploads it as a release asset so the
  # ops team can download it and deploy to dashboard.aiacta.org
  # without needing to run a build themselves.
  # ──────────────────────────────────────────────────────────────
  build-dashboard-release:
    name: Build dashboard for release
    runs-on: ubuntu-latest
    needs: [validate-tag, test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
      - run: npm install
        working-directory: packages/aac-dashboard-lite
      - run: npm run build
        working-directory: packages/aac-dashboard-lite
        env:
          NODE_ENV: production

      # Zip the dist folder for attachment to the GitHub Release
      - name: Create dashboard zip
        run: |
          VERSION="${{ needs.validate-tag.outputs.version }}"
          zip -r "aac-dashboard-$VERSION.zip" packages/aac-dashboard-lite/dist/
          echo "Created aac-dashboard-$VERSION.zip"

      - name: Save dashboard zip as artifact
        uses: actions/upload-artifact@v7
        with:
          name: dashboard-release-zip
          path: "aac-dashboard-*.zip"
          retention-days: 90

  # ──────────────────────────────────────────────────────────────
  # JOB 6 — CREATE GITHUB RELEASE
  # Creates the GitHub Release page with:
  #   - Release notes extracted from CHANGELOG.md
  #   - Dashboard zip attached as a downloadable asset
  # ──────────────────────────────────────────────────────────────
  create-github-release:
    name: Upload assets to existing GitHub Release
    runs-on: ubuntu-latest
    needs:
      - validate-tag
      - publish-npm
      - publish-pypi
      - build-dashboard-release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          # Full history needed to read CHANGELOG.md
          fetch-depth: 0


      # Extract the release notes for THIS version from CHANGELOG.md.
      # The CHANGELOG format is:
      #   ## [1.1.0] — 2026-04-01
      #   ... notes ...
      #   ## [1.0.0] — 2026-03-29
      # This script extracts everything between the current version
      # header and the next version header.

      - name: Download dashboard artifact
        uses: actions/download-artifact@v8
        with:
          name: dashboard-release-zip
          path: ./release-assets/

      # The GitHub Release already exists — release-please created and
      # published it before this workflow ran. We must upload the asset
      # to the existing release rather than creating a new one.
      # softprops/action-gh-release fails here because it tries to
      # re-publish the release, which GitHub rejects as immutable.
      # The gh CLI can upload assets to an already-published release.
      - name: Upload dashboard zip to existing release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.validate-tag.outputs.version }}"
          ASSET=$(ls ./release-assets/aac-dashboard-*.zip | head -1)

          if [ -z "$ASSET" ]; then
            echo "No dashboard zip found in release-assets/"
            exit 1
          fi

          echo "Uploading $ASSET to release v$VERSION..."
          gh release upload "v$VERSION" "$ASSET" --clobber

          echo "✓ Asset uploaded successfully"
          echo "Release: https://github.com/${{ github.repository }}/releases/tag/v$VERSION"

      - name: Update release notes with install commands
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.validate-tag.outputs.version }}"

          # Extract this version's section from CHANGELOG.md
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for full details."
          fi

          # Append install instructions to the release notes
          BODY="${NOTES}
