#       PROVIDER_URL: https://aiacta-mock-provider.onrender.com
#       PUBLISHER_URL: https://aiacta-mock-publisher.onrender.com
#     steps:
#       - uses: actions/checkout@v4
#       - uses: actions/setup-node@v4
#         with:
#           node-version: '20.x'
