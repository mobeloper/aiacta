# ============================================================
#  security.yml  —  Scheduled Security Scanning
# ============================================================
#
#  WHAT THIS DOES:
#  Runs weekly (and on every push to main) to:
#    1. Scan npm dependencies for known CVEs
#    2. Scan Go dependencies for known CVEs (govulncheck)
#    3. Scan Python dependencies for known CVEs (safety)
#    4. Scan source code with CodeQL static analysis
#    5. Upload all results to GitHub Security tab
#
#  WHERE TO SEE RESULTS:
#  GitHub repository → Security → Code scanning alerts
#  GitHub repository → Security → Dependabot alerts
#
#  WHY WEEKLY:
#  New vulnerabilities are discovered every day in third-party
#  packages. A vulnerability that was not present on Monday may
#  be published on Thursday. Weekly scanning catches these between
#  releases.
#
# ============================================================

name: Security

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

# FIX 5: Opt into Node.js 24 for all action runtimes
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ──────────────────────────────────────────────────────────────
  # JOB 1 — CODEQL ANALYSIS
  # FIX 1: codeql-action@v3 (was @v4 which doesn't exist)
  # ──────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL analysis (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript', 'go', 'python']
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  # ──────────────────────────────────────────────────────────────
  # JOB 2 — NPM DEPENDENCY SCAN
  # FIX 1: actions/checkout@v4, setup-node@v4, upload-artifact@v4
  # FIX 2: npm install instead of npm ci, removed cache: 'npm'
  # ──────────────────────────────────────────────────────────────
  npm-audit:
    name: npm dependency scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # FIX 1+2: correct action version, no cache (no lock file)
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      # FIX 2: npm install instead of npm ci
      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        run: |
          npm audit --json > npm-audit.json || true
          node -e "
          const r = require('./npm-audit.json');
          const meta = r.metadata || {};
          const vulns = meta.vulnerabilities || {};
          console.log('Vulnerability summary:');
          console.log('  critical:', vulns.critical || 0);
          console.log('  high:    ', vulns.high || 0);
          console.log('  moderate:', vulns.moderate || 0);
          console.log('  low:     ', vulns.low || 0);
          const blocking = (vulns.critical || 0) + (vulns.high || 0);
          if (blocking > 0) {
            console.error(blocking + ' high/critical vulnerabilities require attention.');
            process.exit(1);
          }
          "

      # FIX 1: upload-artifact@v4 (was @v7 which doesn't exist)
      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: npm-audit-weekly
          path: npm-audit.json
          retention-days: 90
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────
  # JOB 3 — GO VULNERABILITY SCAN
  # FIX 1: actions/checkout@v4, setup-go@v5 (was @v6)
  # FIX 3: cache-dependency-path for nested go.mod
  # FIX 4: go-version: 'stable' (latest patched Go — fixes stdlib CVEs)
  # ──────────────────────────────────────────────────────────────
  go-vuln:
    name: Go vulnerability scan (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # FIX 1+3+4: correct action, go.mod path, latest stable Go
      - uses: actions/setup-go@v6
        with:
          # 'stable' always uses the latest stable release, which has
          # all stdlib CVEs patched (fixes govulncheck exit code 3)
          go-version: 'stable'
          # FIX 3: go.mod is NOT at repo root — it's nested here
          cache-dependency-path: packages/ai-citation-sdk/src/go/go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Scan Go SDK
        working-directory: packages/ai-citation-sdk/src/go
        run: govulncheck ./...

  # ──────────────────────────────────────────────────────────────
  # JOB 4 — PYTHON DEPENDENCY SCAN
  # FIX 1: actions/checkout@v4, setup-python@v5, upload-artifact@v4
  # ──────────────────────────────────────────────────────────────
  python-audit:
    name: Python dependency scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # FIX 1: setup-python@v5 (was @v6)
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        run: |
          pip install cryptography>=41.0 requests>=2.31
          pip-audit --desc --output pip-audit.json --format json || true
          pip-audit --desc

      # FIX 1: upload-artifact@v4 (was @v7)
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-weekly
          path: pip-audit.json
          retention-days: 90
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────
  # JOB 5 — SECRET SCANNING
  # FIX 1: actions/checkout@v6 (was @v6)
  # ──────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret scanning (truffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan for committed secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --debug --only-verified
        continue-on-error: true
