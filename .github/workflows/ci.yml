# ============================================================
#  ci.yml  —  AIACTA Main Continuous Integration Workflow
# ============================================================
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read
  actions: read

# Opt all action runtimes into Node.js 24 — silences Node.js 20 deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ──────────────────────────────────────────────────────────────
  # JOB 1 — CHANGE DETECTION
  # ──────────────────────────────────────────────────────────────
  changes:
    name: Detect changed packages
    runs-on: ubuntu-latest
    outputs:
      node:      ${{ steps.filter.outputs.node }}
      go:        ${{ steps.filter.outputs.go }}
      python:    ${{ steps.filter.outputs.python }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      schemas:   ${{ steps.filter.outputs.schemas }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            node:
              - 'packages/ai-attribution-lint/**'
              - 'packages/ai-citation-sdk/src/node/**'
              - 'packages/crawl-manifest-client/src/node/**'
              - 'packages/aac-server/**'
              - 'packages/vwp-gateway/**'
              - 'packages/referrer-middleware/src/node/**'
              - 'packages/honeypot-verifier/**'
              - 'shared/**'
              - 'package.json'
            go:
              - 'packages/ai-citation-sdk/src/go/**'
            python:
              - 'packages/crawl-manifest-client/src/python/**'
            dashboard:
              - 'packages/aac-dashboard-lite/**'
            schemas:
              - 'shared/schemas/**'
              - 'packages/attribution-test-harness/fixtures/**'

  # ──────────────────────────────────────────────────────────────
  # JOB 2 — NODE.JS TESTS
  # supertest upgraded to ^7.0.0 in every package.json
  # to fix Express 5 compatibility (supertest@6 does not support Express 5)
  # ──────────────────────────────────────────────────────────────
  test-node:
    name: "Node ${{ matrix.node }} — ${{ matrix.package }}"
    runs-on: ubuntu-latest
    needs: [changes]
    strategy:
      fail-fast: false
      matrix:
        node: ['18.x', '20.x', '22.x']
        package:
          - ai-attribution-lint
          - ai-citation-sdk
          - crawl-manifest-client
          - aac-server
          - vwp-gateway
          - referrer-middleware
          - honeypot-verifier
        include:
          - package: aac-server
            db_path: ':memory:'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      # Install at MONOREPO ROOT — workspace symlinks resolve correctly
      - name: Install all workspace dependencies
        run: npm ci

      - name: Run tests — ${{ matrix.package }}
        working-directory: packages/${{ matrix.package }}
        run: npm test -- --forceExit
        env:
          NODE_ENV: test
          CI: 'true'
          NO_COLOR: '1'
          AAC_DB_PATH: ${{ matrix.db_path || '' }}

      - name: Upload coverage report
        if: matrix.node == '20.x' && matrix.package == 'aac-server'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: packages/aac-server/coverage
          flags: aac-server
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────────────────
  # JOB 3 — GO SDK TESTS
  # gofmt check is WARNING ONLY — does not block CI
  # ──────────────────────────────────────────────────────────────
  test-go:
    name: "Go ${{ matrix.go }} — ai-citation-sdk"
    runs-on: ubuntu-latest
    needs: [changes]
    strategy:
      fail-fast: false
      matrix:
        go: ['1.21', '1.22']

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: packages/ai-citation-sdk/src/go/go.mod

      - name: Run tests with race detector
        working-directory: packages/ai-citation-sdk/src/go
        run: go test -v -race -count=1 ./...

      - name: Run go vet
        working-directory: packages/ai-citation-sdk/src/go
        run: go vet ./...

      - name: Check gofmt formatting (warning only)
        working-directory: packages/ai-citation-sdk/src/go
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "::warning::Go files need gofmt formatting (run 'gofmt -w .' locally): $UNFORMATTED"
          fi

  # ──────────────────────────────────────────────────────────────
  # JOB 4 — PYTHON TESTS
  #
  # CRITICAL: Every include row MUST have a python: key.
  # Without it, GitHub Actions cannot merge the include rows with
  # the python version list → 3 jobs run with empty fields → exit 5.
  #
  # Also: ai-citation-sdk/src/python has ZERO Python test files.
  # Only crawl-manifest-client has Python tests.
  # So: 3 rows × crawl-manifest-client only.
  # ──────────────────────────────────────────────────────────────
  test-python:
    name: "Python ${{ matrix.python }} — crawl-manifest-client"
    runs-on: ubuntu-latest
    needs: [changes]
    strategy:
      fail-fast: false
      matrix:
        include:
          - python: '3.9'
            requirements: packages/crawl-manifest-client/src/python/requirements.txt
            test_file: packages/crawl-manifest-client/tests/python_client.test.py
          - python: '3.11'
            requirements: packages/crawl-manifest-client/src/python/requirements.txt
            test_file: packages/crawl-manifest-client/tests/python_client.test.py
          - python: '3.12'
            requirements: packages/crawl-manifest-client/src/python/requirements.txt
            test_file: packages/crawl-manifest-client/tests/python_client.test.py

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'
          cache-dependency-path: ${{ matrix.requirements }}

      - name: Install dependencies
        run: pip install -r ${{ matrix.requirements }}

      - name: Run pytest
        run: |
          python -m pytest ${{ matrix.test_file }} --import-mode=importlib \
            -v --tb=short -x \
            --no-header --color=no
        env:
          PYTHONDONTWRITEBYTECODE: '1'

  # ──────────────────────────────────────────────────────────────
  # JOB 5 — LINT ai-attribution.txt FIXTURES
  #
  # BOTH of these install and path fixes are critical:
  #   1. npm install at REPO ROOT (no working-directory)
  #   2. All paths are repo-root-relative
  #      WRONG: ../../attribution-test-harness/  (resolves to <root>/attribution-test-harness/ — MISSING)
  #      RIGHT: packages/attribution-test-harness/fixtures/...
  # ──────────────────────────────────────────────────────────────
  lint-fixtures:
    name: Validate ai-attribution.txt fixtures
    runs-on: ubuntu-latest
    needs: [changes]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      - name: Install dependencies (repo root)
        run: npm ci

      - name: Valid fixture — must exit 0
        run: |
          node packages/ai-attribution-lint/src/cli.js \
            packages/attribution-test-harness/fixtures/ai-attribution-txt/valid.txt \
            --json
          echo "Valid fixture passed linting"

      - name: Invalid fixture — must exit non-zero
        run: |
          set +e
          node packages/ai-attribution-lint/src/cli.js \
            packages/attribution-test-harness/fixtures/ai-attribution-txt/invalid.txt \
            --json
          CODE=$?
          set -e
          if [ "$CODE" -eq 0 ]; then
            echo "FAIL: Linter accepted an INVALID fixture"
            exit 1
          fi
          echo "Invalid fixture correctly rejected (exit $CODE)"

  # ──────────────────────────────────────────────────────────────
  # JOB 6 — DASHBOARD BUILD
  #
  # npm install must run at REPO ROOT.
  # crawl-manifest-client: "*" was removed from dashboard dependencies
  # because it is a Node.js server library (uses node-cache with Node.js
  # built-ins) that Vite cannot bundle for the browser. The dashboard
  # does not actually import from it anyway.
  # ──────────────────────────────────────────────────────────────
  build-dashboard:
    name: Build React dashboard
    runs-on: ubuntu-latest
    needs: [changes]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      - name: Install dependencies (repo root)
        run: npm ci

      - name: Build (Vite production)
        run: npm run build
        working-directory: packages/aac-dashboard-lite
        env:
          NODE_ENV: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: dashboard-dist-${{ github.sha }}
          path: packages/aac-dashboard-lite/dist/
          retention-days: 7
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────
  # JOB 7 — SECURITY AUDIT
  # ──────────────────────────────────────────────────────────────
  audit:
    name: npm security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
      - run: npm ci
      - name: Audit — fail on high/critical
        run: npm audit --audit-level=high
      - name: Audit — full report (informational)
        run: npm audit --json > npm-audit-report.json || true
      - uses: actions/upload-artifact@v7
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          retention-days: 30
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────
  # JOB 8 — SPEC SECTION ALIGNMENT (warnings only)
  # ──────────────────────────────────────────────────────────────
  spec-alignment:
    name: Spec section reference audit
    runs-on: ubuntu-latest
    needs: [changes]
    steps:
      - uses: actions/checkout@v6
      - name: Extract and check spec references
        run: |
          REFS=$(grep -rh "§[0-9][0-9.]*[A-D]*" packages/ shared/ \
            --include="*.js" --include="*.ts" --include="*.py" --include="*.go" \
            2>/dev/null | grep -oE "§[0-9][0-9.]*[A-D]*" | sort -u)
          [ -z "$REFS" ] && echo "No §section references found." && exit 0
          MISSING=0
          while IFS= read -r ref; do
            BASE=$(echo "$ref" | sed 's/§//' | sed 's/[A-D]$//')
            if grep -qr "$BASE" docs/proposals/ 2>/dev/null || grep -qr "$ref" docs/proposals/ 2>/dev/null; then
              echo "  OK: $ref"
            else
              echo "  WARN: $ref not in docs/proposals/"
              MISSING=$((MISSING+1))
            fi
          done <<< "$REFS"
          [ $MISSING -gt 0 ] && echo "::warning::$MISSING spec refs unmatched in docs"
          exit 0

  # ──────────────────────────────────────────────────────────────
  # JOB 9 — JSON SCHEMA VALIDATION (warnings only)
  # ──────────────────────────────────────────────────────────────
  validate-schemas:
    name: Validate JSON schemas and fixtures
    runs-on: ubuntu-latest
    needs: [changes]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
      - run: npm install -g ajv-cli ajv-formats
      - name: Check schemas are valid JSON
        run: |
          for f in shared/schemas/*.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" \
              && echo "  OK: $f" || (echo "  FAIL: $f" && exit 1)
          done
      - name: Validate crawl-manifest fixture
        run: |
          ajv validate -s shared/schemas/crawl-manifest.schema.json \
            -d packages/attribution-test-harness/fixtures/crawl-manifest/sample.json \
            --spec=draft7 --strict=false 2>&1 \
            && echo "  OK: crawl-manifest" || echo "::warning::crawl-manifest fixture warnings"
      - name: Validate citation-webhook fixture
        run: |
          ajv validate -s shared/schemas/citation-webhook.schema.json \
            -d packages/attribution-test-harness/fixtures/citation-webhooks/sample-event.json \
            --spec=draft7 --strict=false 2>&1 \
            && echo "  OK: citation-webhook" || echo "::warning::citation-webhook fixture warnings"

  # ──────────────────────────────────────────────────────────────
  # JOB 10 — FINAL GATE
  # ──────────────────────────────────────────────────────────────
  ci-status:
    name: "CI — all checks passed"
    runs-on: ubuntu-latest
    needs:
      - changes
      - test-node
      - test-go
      - test-python
      - lint-fixtures
      - build-dashboard
      - audit
      - spec-alignment
      - validate-schemas
    if: always()
    steps:
      - name: Evaluate all job results
        run: |
          python3 - << 'PY'
          import sys, json
          results = json.loads("""${{ toJSON(needs) }}""")
          passed, failed = [], []
          for job, data in results.items():
              r = data.get('result', 'unknown')
              (passed if r in ('success', 'skipped') else failed).append((job, r))
          for j, r in passed:  print(f"  PASS  {j}: {r}")
          for j, r in failed:  print(f"  FAIL  {j}: {r}")
          if failed:
              print(f"\n{len(failed)} job(s) failed.")
              sys.exit(1)
          print(f"\nAll {len(passed)} checks passed.")
          PY
