# AIACTA nginx config — logs X-AI-Crawl-Purpose headers (Section 2.4)
map $http_user_agent $is_ai_bot {
  default 0;
  "~*GPTBot"          1;
  "~*ClaudeBot"       1;
  "~*Google-Extended" 1;
  "~*PerplexityBot"   1;
  "~*Grok-Bot"        1;
}
log_format ai_crawl '$remote_addr [$time_iso8601] "$request" $status '
                    '"$http_user_agent" "$http_x_ai_crawl_purpose" "$http_x_ai_crawl_session"';
access_log /var/log/nginx/ai_crawl.log ai_crawl if=$is_ai_bot;
